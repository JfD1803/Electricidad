<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculos Eléctricos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>
<body class="bg-[url('/static/imagenes/subestacion.jpg')] bg-cover bg-center bg-fixed">
    {% include 'Headers.html' %}
    <div class="pt-32 min-h-screen flex flex-col items-center space-y-10 pb-10">
        
        <section class="max-w-4xl w-full px-4">
            <div class="text-2xl font-extrabold text-red-600 p-8 rounded-2xl border border-white/20 
                         bg-black/20 backdrop-blur-md shadow-2xl text-center">
                <h1 class="text-xl font-extrabold text-blue-600">Aplicación para generar circuitos eléctricos</h1>
                <p class="text-lg font-medium text-white mt-2">
                    Cálculos bajo normativa NTC 2050 y RETIE
                </p>
            </div>
        </section>

        <section class="w-full flex justify-center px-4">
            <form action="/guardar" method="POST" 
                  class="w-full max-w-md p-8 rounded-2xl border border-white/20 
                         bg-black/20 backdrop-blur-md shadow-2xl">
                
                <h2 class="text-3xl font-bold text-red-600 mb-6 text-center">
                    Ingresa datos para cálculos
                </h2>
                <div class="space-y-4">
                    <div class="flex flex-col">
                        <label class="text-blue-400 text-sm font-medium mb-1">Distancia</label>
                        <input type="text" name="longitud" placeholder="Longitud del circuito en (m)"
                               class="bg-white/10 border border-white/20 rounded-lg p-2 text-white placeholder:text-gray-400 focus:bg-white/20 outline-none transition-all">
                    </div>

                    <div class="flex flex-col">
                        <label class="text-blue-400 text-sm font-medium mb-1">Impedancia del cable</label>
                        <input type="text" name="impedancia" placeholder="Impedancia del cable en (Ω)"
                               class="bg-white/10 border border-white/20 rounded-lg p-2 text-white placeholder:text-gray-400 focus:bg-white/20 outline-none transition-all">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-blue-400 text-sm font-medium mb-1">Tensión del circuito</label>
                        <input type="number" name="tension" id="input_tension" placeholder="Tensión nominal en (V)"
                               class="bg-white/10 border border-white/20 rounded-lg p-2 text-white placeholder:text-gray-400 focus:bg-white/20 outline-none transition-all">
                        
                        <div id="tipo_sistema" class="hidden"></div>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-blue-400 text-sm font-medium mb-1">Carga del circuito</label>
                        <input type="text" name="carga_w" placeholder="Carga en W"
                               class="bg-white/10 border border-white/20 rounded-lg p-2 text-white placeholder:text-gray-400 focus:bg-white/20 outline-none transition-all">
                    </div>

                    <button type="submit" 
                            class="w-full bg-red-500 hover:bg-red-400 text-white font-bold py-3 rounded-lg mt-4 transition-colors">
                        Guardar datos
                    </button>

                    {% if result %}
                    <div class="mt-4 space-y-2">
                        <div class="p-3 bg-black/40 rounded-lg border border-blue-500/30">
                            <p class="text-white text-center">Corriente: <span class="font-bold text-blue-300">{{result}} A</span></p>
                        </div>
                        <div class="p-3 bg-black/40 rounded-lg border border-blue-500/30">
                            <p class="text-white text-center">Caída de tensión: <span class="font-bold text-blue-300">{{resCaidaTen}} V</span></p>
                        </div>
                    </div>
                    {% endif %}
                </div>
            </form>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/validaciones.js') }}"></script>
<body>
